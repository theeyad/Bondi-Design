<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="HTML, CSS, JS, Bootstrap">
    <meta name="description" content="Bondi Design">
    <meta name="author" content="Eyad Othman">
    <title>Bondi</title>
    <!-- Roboto Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- Bootstrap Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Start Header -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container container-fluid-xxl">
            <a class="navbar-brand" href="#">
                <img src="images/logo.png" alt="Website Logo">
            </a>
            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0"">
                    <li class=" nav-item">
                    <a class="nav-link p-2 p-lg-3 active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link p-2 p-lg-3" aria-current="page" href="#">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link p-2 p-lg-3" aria-current="page" href="#">Portfolio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link p-2 p-lg-3" aria-current="page" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link p-2 p-lg-3" aria-current="page" href="#">Contact</a>
                    </li>
                </ul>
            </div>
            <div class="search ps-2 ms-3 d-none d-lg-block">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <a class="login btn rounded-pill ms-1 ms-lg-3 custom-btn px-3 py-2" href="#">Login</a>
        </div>
    </nav>
    <!-- End Header -->

    <!-- Start Landing -->
    <div class="landing d-flex justify-content-center align-items-center">
        <div class="introduction text-center">
            <h1 class="intro text-capitalize text-white mb-0">taste the creativity</h1>
            <p class="desc fw-bold mt-2 mb-0">We make awesome graphic and web design</p>
            <a class="start btn rounded-pill custom-btn text-capitalize mt-5 fw-bold fs-5 px-3 py-2" href="#">get started</a>
        </div>

    </div>
    <!-- End Landing -->


    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/bcf95508ed.js" crossorigin="anonymous"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>

</html>
